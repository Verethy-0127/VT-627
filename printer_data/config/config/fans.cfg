[heater_generic chamber_heater]
heater_pin: PD13 # this is the fan pin that controls bed fans
sensor_type: Generic 3950 
sensor_pin: PF4 # this is a chamber thermistor

#Do not touch pid info or anything below here
control: pid 
pid_Kp: 61.470837
pid_Ki: 0.5
pid_Kd: 0
pwm_cycle_time: 0.3
min_temp: 1
max_temp: 150

#Do not touch pid info or anything here
[verify_heater chamber_heater]
max_error: 120
check_gain_time: 120
hysteresis: 50
heating_gain: 1


#end 'fake' block


[heater_fan hotend_fan]
pin: EBB:PD2
heater: extruder
heater_temp: 50.0


# Part Cooling Fan
[multi_pin pcf_fan]
pins: EBB:PD3, EBB:PA5

[fan]
pin: multi_pin:pcf_fan


#electronics bay fans
[controller_fan elec_fan]
pin: PD12
kick_start_time: 0.5
fan_speed: 0.6
idle_timeout: 60
stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2


#driver fans
[multi_pin mcu_fan]
pins: PD14, PD15
 
[controller_fan driver_fan]
pin: multi_pin:mcu_fan
kick_start_time: 0.5
fan_speed: 0.6
idle_timeout: 60
stepper: stepper_x, stepper_y, stepper_z, stepper_z1, stepper_z2


[heater_fan Chamber]
pin: PA8
fan_speed: 0.5
heater: heater_bed
heater_temp: 90